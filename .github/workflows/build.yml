name: Docker Build - 本地构建

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker 镜像标签名 (例如：latest, v1.0)'
        required: false
        default: 'latest'

jobs:
  build-image:
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1: 检出你的代码仓库
      - name: 检出源代码
        uses: actions/checkout@v4
        # 这步会将你的 GitHub 仓库代码下载到 GitHub Actions 的虚拟机中

      # 步骤 2: 设置 Docker Buildx (Docker 构建工具)
      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3
        # 这步会安装和配置 Docker Buildx，用于更高效地构建镜像
        # 它不会拉取任何镜像，只是安装构建工具

      # 步骤 3: 使用你的 Dockerfile 构建镜像
      - name: 构建 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .  
          # 关键点：context: . 表示使用当前目录的 Dockerfile 进行构建
          # 会从你的 Dockerfile 第一行开始执行，逐步构建镜像
          
          push: false  
          # 关键点：push: false 表示只构建，不推送到任何镜像仓库
          
          tags: codex-console:${{ github.event.inputs.tag }}
          # 给构建好的镜像打上标签，例如：codex-console:latest
          
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 使用 GitHub Actions 缓存加速构建（可选，不影响是否拉取镜像）
          
        # 构建过程说明：
        # 1. 读取你项目根目录的 Dockerfile
        # 2. 执行 FROM python:3.11-slim (这一步会拉取基础镜像，这是必需的)
        # 3. 执行 RUN、COPY 等指令，安装依赖、复制代码
        # 4. 最终生成完整的 Docker 镜像
        # 
        # ⚠️ 注意：会拉取 python:3.11-slim 基础镜像
        # 这是正常的，所有 Docker 构建都需要一个基础镜像作为起点
        # 之后的所有层都是根据你的 Dockerfile 从头构建的

      # 步骤 4: 构建完成确认
      - name: ✅ 构建成功提示
        run: |
          echo "==================================="
          echo "✅ Docker 镜像已构建成功！"
          echo "镜像标签：codex-console:${{ github.event.inputs.tag }}"
          echo "状态：仅本地构建，未推送到任何仓库"
          echo "==================================="