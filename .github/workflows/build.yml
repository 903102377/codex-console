name: Docker Build - 构建并导出镜像

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'codex-console'
        required: false
        default: 'latest'

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1: 检出源代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2: 设置 Docker Buildx
      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤 3: 构建 Docker 镜像并导出到文件
      - name: 构建 Docker 镜像
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          push: false
          tags: codex-console:${{ github.event.inputs.tag }}
          outputs: type=docker,dest=/tmp/codex-console-${{ github.event.inputs.tag }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # outputs: type=docker,dest=xxx 表示将镜像导出为 tar 文件

      # 步骤 4: 上传镜像文件到 GitHub Artifacts
      - name: 上传 Docker 镜像文件
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.event.inputs.tag }}
          path: /tmp/codex-console-${{ github.event.inputs.tag }}.tar
          retention-days: 7
          # 镜像文件会保留 7 天，之后自动删除
          # 你可以在 GitHub Actions 页面手动下载

      # 步骤 5: 显示下载说明
      - name: ✅ 构建完成提示
        run: |
          echo "==================================="
          echo "✅ Docker 镜像已构建并导出成功！"
          echo ""
          echo "📦 镜像文件：codex-console-${{ github.event.inputs.tag }}.tar"
          echo "⬇️  下载方式："
          echo "   1. 点击上方的 Summary 标签"
          echo "   2. 在 Artifacts 区域找到 docker-image-${{ github.event.inputs.tag }}"
          echo "   3. 点击下载按钮即可下载到本地"
          echo ""
          echo "💾 文件大小：约 1-2 GB"
          echo "⏰ 保留时间：7 天"
          echo "==================================="